name: WC2026 Auto-Sync Results

on:
  schedule:
    - cron: "0 8 * * *"   # 8:00 AM UTC = 9:00 AM BST daily
  workflow_dispatch:

jobs:
  sync-office:
    name: Sync office game
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - name: Sync office results
        run: node sync.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

  sync-friends:
    name: Sync friends game
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - name: Sync friends results
        run: node sync-friends.js
        env:
          FIREBASE_SERVICE_ACCOUNT_FRIENDS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FRIENDS }}
